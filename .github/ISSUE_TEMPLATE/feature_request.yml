name: Feature Request
description: Suggest a new feature or API improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Check the [roadmap](https://github.com/levos-snr/pesafy#roadmap) first to see if it's already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the pain point or use case.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include API shape if possible.
      render: typescript
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core SDK (Mpesa class)
        - STK Push
        - C2B
        - B2C
        - B2B
        - Account Balance
        - Transaction Status
        - Reversal
        - Tax Remittance
        - Dynamic QR
        - Bill Manager
        - Webhooks
        - Express adapter
        - Hono adapter
        - Next.js adapter
        - Fastify adapter
        - React components
        - Vue components
        - CLI
        - Types / DX
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're currently using.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to Daraja docs, related issues, etc.
