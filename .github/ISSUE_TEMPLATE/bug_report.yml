name: Bug Report
description: Report a bug in pesafy
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: pesafy version
      placeholder: "e.g. 0.5.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
        - Deno
        - Cloudflare Workers
        - Other
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: "e.g. Node.js 20.14.0"
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Framework adapter (if applicable)
      options:
        - None (core SDK)
        - Express
        - Hono
        - Next.js
        - Fastify
        - Other

  - type: dropdown
    id: environment
    attributes:
      label: Daraja environment
      options:
        - sandbox
        - production
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Provide the smallest possible code snippet that reproduces the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (including error output)
      render: shell
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, Daraja error codes, etc.
