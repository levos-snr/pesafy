codecov:
  notify:
    after_n_builds: 3

coverage:
  precision: 2
  round: down
  range: "0...100"

  status:
    project:
      default:
        # Informational only while tests are being written — never blocks CI.
        # Change to a real target (e.g. 80%) once all modules are covered.
        target: auto # auto = "don't go lower than current"
        threshold: 100% # wide open: any value passes
        informational: true # post a status but never set it to "failure"
    patch:
      default:
        informational: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true # only comment when coverage changes

ignore:
  - "src/components/**"
  - "**/*.d.ts"
  - "**/*.config.ts"
  - "dist/**"
  - "coverage/**"
