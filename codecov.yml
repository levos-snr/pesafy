codecov:
  # Token is read from the CODECOV_TOKEN GitHub Actions secret — never hardcode it here.
  # See: https://docs.codecov.com/docs/quick-start

  # Notify after this many builds are received
  notify:
    after_n_builds: 3 # one per matrix node (20, 22, 24) — wait for all

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2% # allow a 2% dip before marking red
    patch:
      default:
        target: 75%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true # only comment when coverage changes

ignore:
  - "src/components/**"
  - "**/*.d.ts"
  - "**/*.config.ts"
  - "dist/**"
  - "coverage/**"
